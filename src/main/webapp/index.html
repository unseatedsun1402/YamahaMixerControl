<!DOCTYPE html>
<html>
<head>
  <title>Scan to Access</title>
  <style>
    body { background: #222; color: #fff; font-family: sans-serif; text-align: center; }
    .qr-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; padding: 2rem; }
    .qr-item { background: #333; padding: 1rem; border-radius: 8px; }
    .qr-item img { width: 200px; height: 200px; }
    .qr-item label { display: block; margin-top: 0.5rem; color: #ccc; }
  </style>
</head>
<body>
  <h1>Scan to Access Mixer Pages</h1>
  <div class="qr-grid">
    <!-- Dynamically list images -->
    <!-- Example: -->
    <div class="qr-item">
      <img src="qrcodes/mix_1_qr.png" alt="mix_1">
      <label>mix_1.html</label>
    </div>
  </div>
</body>
</html>
